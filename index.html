const loginForm = document.getElementById('loginForm');

    'auth/too-many-requests':'محاولات كثيرة، حاولي بعد قليل',

  return map[code] || 'حدث خطأ أثناء تسجيل الدخول، حاولي مرة أخرى';

onAuthStateChanged(auth, (user) => {

/* =========================================================================
   NEW-ORDER NOTIFICATIONS
========================================================================= */
let ordersInitialized = false;
let customInitialized = false;
function notifyNewOrder(kind, data){
  const label = kind==='order' ? 'طلب جديد 🔔' : 'طلب خاص جديد 🎨';
  const body = kind==='order' ? `${data.customer} — ${data.total} ج.س` : `${data.name} — ${data.occasion||''}`;
  showToast(`${label} ${kind==='order' ? 'من ' + data.customer : 'من ' + data.name}`, true);
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(label, { body, icon:'', tag: kind+'-'+Date.now() }); }catch(e){}
  }
}

/* =========================================================================
   REAL-TIME LISTENERS  (same Firestore project the storefront reads from)
========================================================================= */
function startListeners(){
  unsub.push(onSnapshot(collection(db,'products'), snap => {
    products = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    if(activeAdminTab==='products') renderProdRows();
    if(activeAdminTab==='reports') renderReportsTab();
  }, err => showToast('تعذر تحميل المنتجات — ' + friendlyFirebaseError(err), true)));

  unsub.push(onSnapshot(collection(db,'offers'), snap => {
    offers = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    if(activeAdminTab==='offers') renderOfferRows();
  }));

  unsub.push(onSnapshot(query(collection(db,'orders'), orderBy('createdAt','desc')), snap => {
    if(ordersInitialized){
      snap.docChanges().forEach(ch => { if(ch.type==='added') notifyNewOrder('order', ch.doc.data()); });
    }
    orders = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    ordersInitialized = true;
    if(activeAdminTab==='orders') renderOrderRows();
    if(activeAdminTab==='reports') renderReportsTab();
    renderAdminNav();
  }, err => showToast('تعذر تحميل الطلبات — ' + friendlyFirebaseError(err), true)));

  unsub.push(onSnapshot(doc(db,'settings','store'), snap => {
    if(snap.exists()) settings = snap.data();
    if(activeAdminTab==='settings') renderSettingsTab();
  }));

  unsub.push(onSnapshot(query(collection(db,'customOrders'), orderBy('createdAt','desc')), snap => {
    if(customInitialized){
      snap.docChanges().forEach(ch => { if(ch.type==='added') notifyNewOrder('custom', ch.doc.data()); });
    }
    customOrders = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    customInitialized = true;
    if(activeAdminTab==='custom') renderCustomOrdersTab();
    renderAdminNav();
  }, err => showToast('تعذر تحميل الطلبات الخاصة — ' + friendlyFirebaseError(err), true)));
}

/* =========================================================================
   IMAGE UPLOAD → FIREBASE STORAGE
========================================================================= */
function resizeToBlob(file, maxDim=1000, quality=0.75){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>resolve(blob), 'image/jpeg', quality);
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function uploadImage(file, folder){
  const blob = await resizeToBlob(file);
  const path = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
  const sRef = ref(storage, path);
  await uploadBytes(sRef, blob, { contentType:'image/jpeg' });
  return await getDownloadURL(sRef);
}

/* =========================================================================

========================================================================= */
let toastTimer;
function showToast(msg, isError=false){
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.style.transform = 'translateY(0)';
  clearTimeout(toastTimer);

}

window.toggleDark = () => document.documentElement.classList.toggle('dark');

/* Turns a raw Firebase error into an actionable Arabic message instead of
   a generic "something went wrong" — shows the real cause so it can be fixed. */
function friendlyFirebaseError(err){
  const code = err?.code || '';
  const map = {
    'storage/unauthorized': 'مفيش صلاحية لرفع الصور — راجعي Storage Rules في Firebase Console وتأكدي إنها تسمح بالكتابة للمستخدمين المسجلين (request.auth != null)',
    'storage/unauthenticated': 'لازم تكوني مسجلة دخول عشان ترفعي صور — سجّلي خروج ودخول تاني',
    'storage/unknown': 'تعذر الوصول لخدمة Cloud Storage — أغلب الظن إنها لسه مش مفعّلة في مشروعك. من Firebase Console: Storage ← Get Started',
    'storage/object-not-found': 'الملف غير موجود في التخزين',
    'storage/retry-limit-exceeded': 'انتهت مهلة رفع الصورة، تأكدي من سرعة الإنترنت وحاولي بصورة أصغر',
    'permission-denied': 'الصلاحيات مرفوضة في Firestore — راجعي Firestore Rules وتأكدي إنها تسمح بالكتابة للمستخدمين المسجلين',
    'unavailable': 'تعذر الاتصال بقاعدة البيانات، تحققي من اتصال الإنترنت',
  };
  return map[code] || `حدث خطأ: ${code || err?.message || 'غير معروف'}`;
}

let editingOfferId = null;
let ordersStatusFilter = 'all';
let ordersSearch = '';
let charts = {};
let pfImageFile = null;

function unseenCount(list){ return list.filter(x=>x.seen===false).length; }
function renderAdminNav(){
  const counts = { orders: unseenCount(orders), custom: unseenCount(customOrders) };
  document.getElementById('adminNav').innerHTML = ADMIN_TABS.map(t => {
    const n = counts[t.key] || 0;
    return `<button data-tab="${t.key}" class="admin-sidebar-link shrink-0 relative ${activeAdminTab===t.key?'active':''}">
      <i class="fa-solid ${t.icon} w-4"></i> ${t.label}
      ${n>0 ? `<span class="bg-burgundy text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center mr-auto lg:mr-0 lg:absolute lg:-top-1.5 lg:-left-1.5">${n}</span>`:''}
    </button>`;
  }).join('');
  document.querySelectorAll('#adminNav [data-tab]').forEach(btn=>{
    btn.onclick = () => {
      activeAdminTab = btn.dataset.tab;
      document.getElementById('adminPageTitle').textContent = ADMIN_TABS.find(t=>t.key===activeAdminTab).label;
      renderAdminNav(); renderAdminContent();
      if(activeAdminTab==='orders') markAllSeen('orders', orders);
      if(activeAdminTab==='custom') markAllSeen('customOrders', customOrders);
    };
  });
}
async function markAllSeen(collectionName, list){
  const unseen = list.filter(x=>x.seen===false);
  if(!unseen.length) return;
  try{
    await Promise.all(unseen.map(x=>updateDoc(doc(db,collectionName,x.id), { seen:true })));
  }catch(err){ /* non-critical — badge will just stay until next successful sync */ }
}
function renderAdminContent(){
  if(activeAdminTab==='reports') renderReportsTab();
  if(activeAdminTab==='products') renderProductsTab();
  if(activeAdminTab==='offers') renderOffersTab();
  if(activeAdminTab==='orders') renderOrdersTab();
  if(activeAdminTab==='custom') renderCustomOrdersTab();
  if(activeAdminTab==='settings') renderSettingsTab();
}

/* =========================================================================
   REPORTS TAB
========================================================================= */
function ordersInRange(days){
  if(days>=9999) return orders;
  const from = Date.now() - days*86400000;
  return orders.filter(o=>o.createdAt >= from);
}
function kpiCard(icon, value, label){ return `<div class="admin-card p-5"><i class="fa-solid ${icon} text-gold mb-2"></i><p class="text-2xl font-display">${value}</p><p class="text-xs opacity-50">${label}</p></div>`; }
function statusPill(status){ const c = STATUS_COLOR[status] || '#B08D3E'; return `<span class="status-pill" style="background:${c}22; color:${c}">${status}</span>`; }

function renderReportsTab(){
  const wrap = document.getElementById('adminContent');
  const rangeOrders = ordersInRange(reportsRange);
  const validOrders = rangeOrders.filter(o=>o.status!=='ملغي');
  const revenue = validOrders.reduce((s,o)=>s+o.total,0);
  const avgOrder = validOrders.length ? Math.round(revenue/validOrders.length) : 0;
  const customers = new Set(rangeOrders.map(o=>o.phone)).size;
  const delivered = rangeOrders.filter(o=>o.status==='تم التسليم').length;
  const completionRate = rangeOrders.length ? Math.round(delivered/rangeOrders.length*100) : 0;

  const unseenOrders = unseenCount(orders);
  const unseenCustom = unseenCount(customOrders);
  wrap.innerHTML = `
    ${(unseenOrders+unseenCustom)>0 ? `
    <div class="flex flex-wrap gap-3 mb-6">
      ${unseenOrders>0 ? `<button data-jump="orders" class="jump-alert flex items-center gap-2 bg-burgundy/10 border border-burgundy/30 text-burgundy px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-burgundy/15"><i class="fa-solid fa-bell"></i> ${unseenOrders} طلب جديد لم تتم مراجعته</button>` : ''}
      ${unseenCustom>0 ? `<button data-jump="custom" class="jump-alert flex items-center gap-2 bg-gold/10 border border-gold/30 text-gold px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-gold/15"><i class="fa-solid fa-palette"></i> ${unseenCustom} طلب خاص جديد</button>` : ''}
    </div>` : ''}
    <div class="flex flex-wrap items-center gap-2 mb-6">
      ${[7,30,90,9999].map(r => `<button data-range="${r}" class="range-btn px-4 py-2 rounded-full text-xs font-bold border ${reportsRange===r?'bg-gold border-gold text-ink':'border-gold/25 hover:bg-gold/10'}">${r===9999?'كل الفترة':'آخر '+r+' يوم'}</button>`).join('')}
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
      ${kpiCard('fa-sack-dollar', revenue.toLocaleString()+' ج.س', 'إجمالي الإيرادات')}
      ${kpiCard('fa-bag-shopping', rangeOrders.length, 'عدد الطلبات')}
      ${kpiCard('fa-receipt', avgOrder+' ج.س', 'متوسط قيمة الطلب')}
      ${kpiCard('fa-users', customers, 'عدد العملاء')}
      ${kpiCard('fa-circle-check', completionRate+'%', 'معدل الإنجاز')}
    </div>
    ${orders.length===0 ? `<div class="admin-card p-10 text-center opacity-50"><i class="fa-solid fa-inbox text-3xl mb-3"></i><p>لا توجد طلبات بعد — بمجرد وصول أول طلب من المتجر ستظهر التقارير هنا مباشرة.</p></div>` : `
    <div class="grid lg:grid-cols-3 gap-6 mb-8">
      <div class="admin-card p-6 lg:col-span-2"><p class="font-bold mb-4"><i class="fa-solid fa-chart-line text-gold ml-1"></i> الإيرادات خلال الفترة</p><canvas id="revenueChart" height="130"></canvas></div>
      <div class="admin-card p-6"><p class="font-bold mb-4"><i class="fa-solid fa-chart-pie text-gold ml-1"></i> حالة الطلبات</p><canvas id="statusChart" height="130"></canvas></div>
    </div>
    <div class="grid lg:grid-cols-3 gap-6">
      <div class="admin-card p-6 lg:col-span-1"><p class="font-bold mb-4"><i class="fa-solid fa-ranking-star text-gold ml-1"></i> الأكثر مبيعاً</p><canvas id="topProductsChart" height="180"></canvas></div>
      <div class="admin-card p-6 lg:col-span-2 overflow-x-auto">
        <p class="font-bold mb-4"><i class="fa-solid fa-clock-rotate-left text-gold ml-1"></i> أحدث الطلبات</p>
        <table class="w-full"><thead><tr><th class="admin-th">الطلب</th><th class="admin-th">العميلة</th><th class="admin-th">الإجمالي</th><th class="admin-th">الحالة</th></tr></thead>
        <tbody>${[...orders].slice(0,6).map(o=>`<tr><td class="admin-td">#${o.id.slice(-6).toUpperCase()}</td><td class="admin-td">${o.customer}</td><td class="admin-td">${o.total} ج.س</td><td class="admin-td">${statusPill(o.status)}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`}`;

  document.querySelectorAll('.range-btn').forEach(b=> b.onclick = () => { reportsRange = Number(b.dataset.range); renderReportsTab(); });
  document.querySelectorAll('.jump-alert').forEach(b=> b.onclick = () => {
    activeAdminTab = b.dataset.jump;
    document.getElementById('adminPageTitle').textContent = ADMIN_TABS.find(t=>t.key===activeAdminTab).label;
    renderAdminNav(); renderAdminContent();
    if(activeAdminTab==='orders') markAllSeen('orders', orders);
    if(activeAdminTab==='custom') markAllSeen('customOrders', customOrders);
  });
  if(orders.length) renderReportsCharts(rangeOrders);
}
function renderReportsCharts(rangeOrders){
  Object.values(charts).forEach(c=>c && c.destroy());
  const isDarkMode = document.documentElement.classList.contains('dark');
  Chart.defaults.color = isDarkMode ? '#F3ECE2' : '#1C1512';
  Chart.defaults.font.family = 'Tajawal';

  const days = reportsRange>=9999 ? 30 : reportsRange;
  const labels = [], data = [];
  for(let i=days-1;i>=0;i--){
    const day = new Date(Date.now() - i*86400000);
    labels.push(day.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit'}));
    const sum = rangeOrders.filter(o=> new Date(o.createdAt).toDateString()===day.toDateString() && o.status!=='ملغي').reduce((s,o)=>s+o.total,0);
    data.push(sum);
  }
  charts.revenue = new Chart(document.getElementById('revenueChart'), {
    type:'line', data:{ labels, datasets:[{ label:'الإيرادات', data, borderColor:'#B08D3E', backgroundColor:'rgba(176,141,62,.15)', fill:true, tension:.4, pointRadius:0 }] },
    options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(176,141,62,.1)'}} } }
  });
  const counts = ORDER_STATUSES.map(s=>rangeOrders.filter(o=>o.status===s).length);
  charts.status = new Chart(document.getElementById('statusChart'), {
    type:'doughnut', data:{ labels:ORDER_STATUSES, datasets:[{ data:counts, backgroundColor:ORDER_STATUSES.map(s=>STATUS_COLOR[s]) }] },
    options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}}}} }
  });
  const qtyMap = {};
  rangeOrders.forEach(o=> (o.items||[]).forEach(it=>{ qtyMap[it.name] = (qtyMap[it.name]||0) + it.qty; }));
  const top = Object.entries(qtyMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  charts.top = new Chart(document.getElementById('topProductsChart'), {
    type:'bar', data:{ labels: top.map(t=>t[0]), datasets:[{ data: top.map(t=>t[1]), backgroundColor:'#C08B76', borderRadius:6 }] },
    options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'rgba(176,141,62,.1)'}}, y:{grid:{display:false}} } }
  });
}

   PRODUCTS TAB
========================================================================= */

  document.getElementById('adminContent').innerHTML = `
    <div class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 admin-card overflow-hidden">
        <table class="w-full"><thead><tr><th class="admin-th">المنتج</th><th class="admin-th">القسم</th><th class="admin-th">السعر</th><th class="admin-th">الحالة</th><th class="admin-th"></th></tr></thead>
        <tbody id="prodRows"></tbody></table>
      </div>
      <form id="productForm" class="admin-card p-6 space-y-3 h-fit">
        <p class="font-bold mb-1" id="prodFormTitle"><i class="fa-solid fa-plus text-gold ml-1"></i> إضافة منتج جديد</p>
        <input required id="pfName" placeholder="اسم المنتج" class="admin-input">
        <select id="pfCat" class="admin-input">${CATEGORY_LIST.map(c=>`<option value="${c.key}">${c.name}</option>`).join('')}</select>
        <div class="grid grid-cols-2 gap-2">
          <input required id="pfPrice" type="number" min="0" placeholder="السعر" class="admin-input">
          <input id="pfOld" type="number" min="0" placeholder="السعر قبل الخصم" class="admin-input">
        </div>
        <select id="pfTag" class="admin-input"><option value="new">وصل حديثاً</option><option value="bestseller">الأكثر مبيعاً</option><option value="sale">عرض</option></select>
        <input id="pfBadge" placeholder="شارة (اختياري) مثال: حصري" class="admin-input">
        <input type="file" accept="image/*" id="pfImage" class="w-full text-xs file:ml-2 file:rounded-full file:border-0 file:bg-gold/15 file:text-gold file:px-3 file:py-1.5">
        <img id="pfImgPreview" class="hidden w-full h-32 object-cover rounded-xl">
        <div class="flex gap-2">
          <button type="submit" class="seal-btn flex-1 !py-2.5 text-sm" id="prodFormSubmit">إضافة المنتج</button>
          <button type="button" id="prodFormCancel" class="hidden seal-btn ghost !py-2.5 !px-4 text-sm">إلغاء</button>
        </div>
      </form>
    </div>`;
  renderProdRows();
  document.getElementById('pfImage').addEventListener('change', async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    pfImageFile = file;
    const prev = document.getElementById('pfImgPreview');
    prev.src = URL.createObjectURL(file); prev.classList.remove('hidden');
  });
  document.getElementById('productForm').addEventListener('submit', saveProduct);
  document.getElementById('prodFormCancel').addEventListener('click', resetProductForm);

function renderProdRows(){
  const el = document.getElementById('prodRows'); if(!el) return;
  el.innerHTML = products.map(p => `
    <tr><td class="admin-td flex items-center gap-3"><img src="${p.img||fallbackImg()}" class="w-10 h-10 rounded-lg object-cover">${p.name}</td>
      <td class="admin-td">${catName(p.cat)}</td>
      <td class="admin-td">${p.price} ج.س ${p.old?`<span class="opacity-40 line-through text-xs">${p.old}</span>`:''}</td>
      <td class="admin-td">${p.badge ? statusPill(p.badge) : '<span class="opacity-40 text-xs">—</span>'}</td>
      <td class="admin-td text-left"><button data-edit="${p.id}" class="text-gold hover:opacity-70 ml-3"><i class="fa-solid fa-pen"></i></button><button data-del="${p.id}" class="text-burgundy hover:opacity-70"><i class="fa-solid fa-trash"></i></button></td>
    </tr>`).join('') || `<tr><td class="admin-td opacity-50" colspan="5">لا توجد منتجات بعد — أضيفي أول منتج من النموذج المجاور.</td></tr>`;
  el.querySelectorAll('[data-edit]').forEach(b=> b.onclick = ()=>editProduct(b.dataset.edit));
  el.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=>confirmDeleteProduct(b.dataset.del, b));
}
function editProduct(id){
  const p = products.find(x=>x.id===id); if(!p) return;
  editingProductId = id; pfImageFile = null;
  document.getElementById('pfName').value = p.name;
  document.getElementById('pfCat').value = p.cat;
  document.getElementById('pfPrice').value = p.price;
  document.getElementById('pfOld').value = p.old || '';
  document.getElementById('pfTag').value = p.tag;
  document.getElementById('pfBadge').value = p.badge || '';
  const prev = document.getElementById('pfImgPreview'); prev.src = p.img || fallbackImg(); prev.classList.remove('hidden');
  document.getElementById('prodFormTitle').innerHTML = '<i class="fa-solid fa-pen text-gold ml-1"></i> تعديل المنتج';
  document.getElementById('prodFormSubmit').textContent = 'حفظ التعديلات';
  document.getElementById('prodFormCancel').classList.remove('hidden');
  document.getElementById('productForm').scrollIntoView({behavior:'smooth', block:'center'});
}
function resetProductForm(){
  editingProductId = null; pfImageFile = null;
  document.getElementById('productForm').reset();
  document.getElementById('pfImgPreview').classList.add('hidden');
  document.getElementById('prodFormTitle').innerHTML = '<i class="fa-solid fa-plus text-gold ml-1"></i> إضافة منتج جديد';
  document.getElementById('prodFormSubmit').textContent = 'إضافة المنتج';
  document.getElementById('prodFormCancel').classList.add('hidden');
}
async function saveProduct(e){
  e.preventDefault();
  const btn = document.getElementById('prodFormSubmit'); const original = btn.textContent;
  btn.disabled = true; btn.textContent = 'جارِ الحفظ...';
  try{
    const name = document.getElementById('pfName').value.trim();
    const cat = document.getElementById('pfCat').value;
    const price = Number(document.getElementById('pfPrice').value);
    const old = Number(document.getElementById('pfOld').value) || 0;
    const tag = document.getElementById('pfTag').value;
    const badge = document.getElementById('pfBadge').value.trim();
    let img = editingProductId ? (products.find(x=>x.id===editingProductId)?.img || '') : '';
    if(pfImageFile){
      try{
        img = await uploadImage(pfImageFile, 'products');
      }catch(uploadErr){
        console.error(uploadErr);
        showToast('تعذر رفع الصورة — ' + friendlyFirebaseError(uploadErr) + '. سيتم حفظ المنتج بصورة مؤقتة، عدّليها لاحقاً.', true);
      }
    }
    if(!img) img = fallbackImg();

    if(editingProductId){
      await updateDoc(doc(db,'products',editingProductId), { name, cat, price, old, tag, badge, img });
      showToast(`تم تحديث "${name}" بنجاح ✏️`);
    } else {
      await addDoc(collection(db,'products'), { name, cat, price, old, tag, badge, img, createdAt: Date.now() });
      showToast(`تمت إضافة "${name}" للمتجر مباشرة ✨`);
    }
    flashSync();
    resetProductForm();
  }catch(err){
    showToast('تعذر حفظ المنتج — ' + friendlyFirebaseError(err), true);
    console.error(err);
  }
  btn.disabled = false; btn.textContent = original;
}
let deleteConfirmTimer;
function confirmDeleteProduct(id, btn){
  if(btn.dataset.confirm==='1'){
    deleteDoc(doc(db,'products',id)).then(()=>{ showToast('تم حذف المنتج من المتجر'); flashSync(); });
    return;
  }
  btn.dataset.confirm='1'; btn.innerHTML = '<span class="text-[10px] font-bold">تأكيد؟</span>';
  clearTimeout(deleteConfirmTimer);
  deleteConfirmTimer = setTimeout(()=>{ btn.dataset.confirm='0'; btn.innerHTML='<i class="fa-solid fa-trash"></i>'; }, 3000);
}

    <div class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 admin-card overflow-hidden">
        <table class="w-full"><thead><tr><th class="admin-th">العرض</th><th class="admin-th">الخصم</th><th class="admin-th">القسم</th><th class="admin-th">ينتهي</th><th class="admin-th">مفعّل</th><th class="admin-th"></th></tr></thead>
        <tbody id="offerRows"></tbody></table>
      </div>
      <form id="offerForm" class="admin-card p-6 space-y-3 h-fit">
        <p class="font-bold mb-1" id="offerFormTitle"><i class="fa-solid fa-plus text-gold ml-1"></i> إنشاء عرض جديد</p>
        <input required id="ofTitle" placeholder="عنوان العرض" class="admin-input">
        <div class="grid grid-cols-2 gap-2">
          <input required id="ofDiscount" type="number" min="1" max="90" placeholder="نسبة الخصم %" class="admin-input">
          <input required id="ofEnds" type="datetime-local" class="admin-input">
        </div>
        <select id="ofCategory" class="admin-input">${CATEGORY_LIST.map(c=>`<option value="${c.key}">${c.name}</option>`).join('')}</select>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="ofActive" checked class="w-4 h-4"> عرض مفعّل حالياً</label>
        <div class="flex gap-2">
          <button type="submit" class="seal-btn flex-1 !py-2.5 text-sm" id="offerFormSubmit">حفظ العرض</button>
          <button type="button" id="offerFormCancel" class="hidden seal-btn ghost !py-2.5 !px-4 text-sm">إلغاء</button>
        </div>
      </form>
    </div>`;
  renderOfferRows();
  document.getElementById('offerForm').addEventListener('submit', saveOffer);
  document.getElementById('offerFormCancel').addEventListener('click', resetOfferForm);
}
function renderOfferRows(){
  const el = document.getElementById('offerRows'); if(!el) return;
  el.innerHTML = offers.map(o => `
    <tr><td class="admin-td">${o.title}</td><td class="admin-td">${o.discount}%</td><td class="admin-td">${catName(o.category)}</td>
      <td class="admin-td text-xs">${new Date(o.endsAt).toLocaleString('ar-EG')}</td>
      <td class="admin-td">${o.active ? statusPill('مفعّل') : '<span class="opacity-40 text-xs">متوقف</span>'}</td>
      <td class="admin-td text-left"><button data-edit="${o.id}" class="text-gold hover:opacity-70 ml-3"><i class="fa-solid fa-pen"></i></button><button data-del="${o.id}" class="text-burgundy hover:opacity-70"><i class="fa-solid fa-trash"></i></button></td>
    </tr>`).join('') || `<tr><td class="admin-td opacity-50" colspan="6">لا توجد عروض بعد</td></tr>`;
  el.querySelectorAll('[data-edit]').forEach(b=> b.onclick = ()=>editOffer(b.dataset.edit));
  el.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=>deleteOffer(b.dataset.del));
}
function editOffer(id){
  const o = offers.find(x=>x.id===id); if(!o) return;
  editingOfferId = id;
  document.getElementById('ofTitle').value = o.title;
  document.getElementById('ofDiscount').value = o.discount;
  document.getElementById('ofEnds').value = new Date(o.endsAt - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('ofCategory').value = o.category;
  document.getElementById('ofActive').checked = o.active;
  document.getElementById('offerFormTitle').innerHTML = '<i class="fa-solid fa-pen text-gold ml-1"></i> تعديل العرض';
  document.getElementById('offerFormSubmit').textContent = 'حفظ التعديلات';
  document.getElementById('offerFormCancel').classList.remove('hidden');
}
function resetOfferForm(){
  editingOfferId = null;
  document.getElementById('offerForm').reset();
  document.getElementById('offerFormTitle').innerHTML = '<i class="fa-solid fa-plus text-gold ml-1"></i> إنشاء عرض جديد';
  document.getElementById('offerFormSubmit').textContent = 'حفظ العرض';
  document.getElementById('offerFormCancel').classList.add('hidden');
}
async function saveOffer(e){
  e.preventDefault();
  try{
    const title = document.getElementById('ofTitle').value.trim();
    const discount = Number(document.getElementById('ofDiscount').value);
    const endsAt = new Date(document.getElementById('ofEnds').value).getTime();
    const category = document.getElementById('ofCategory').value;
    const active = document.getElementById('ofActive').checked;
    if(active){
      await Promise.all(offers.filter(o=>o.active).map(o=>updateDoc(doc(db,'offers',o.id), { active:false })));
    }
    if(editingOfferId){
      await updateDoc(doc(db,'offers',editingOfferId), { title, discount, endsAt, category, active });
      showToast('تم تحديث العرض — سيظهر للعميلات فوراً');
    } else {
      await addDoc(collection(db,'offers'), { title, discount, endsAt, category, active });
      showToast('تم إنشاء العرض ونشره في الموقع ✨');
    }
    flashSync(); resetOfferForm();
  }catch(err){ showToast('تعذر حفظ العرض — ' + friendlyFirebaseError(err), true); console.error(err); }
}
async function deleteOffer(id){ await deleteDoc(doc(db,'offers',id)); showToast('تم حذف العرض'); flashSync(); }

/* =========================================================================
   ORDERS TAB
========================================================================= */
function renderOrdersTab(){
  document.getElementById('adminContent').innerHTML = `
    <div class="flex flex-wrap gap-3 mb-5">
      <input id="orderSearchInput" placeholder="ابحثي برقم الطلب أو اسم العميلة" class="admin-input max-w-xs">
      <select id="orderStatusFilter" class="admin-input max-w-[200px]"><option value="all">كل الحالات</option>${ORDER_STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
    </div>
    <div class="admin-card overflow-x-auto">
      <table class="w-full min-w-[760px]"><thead><tr><th class="admin-th">رقم الطلب</th><th class="admin-th">العميلة</th><th class="admin-th">الهاتف</th><th class="admin-th">الإجمالي</th><th class="admin-th">التاريخ</th><th class="admin-th">الحالة</th><th class="admin-th">الفاتورة</th></tr></thead>
      <tbody id="orderRowsBody"></tbody></table>
    </div>`;
  document.getElementById('orderSearchInput').addEventListener('input', (e)=>{ ordersSearch = e.target.value; renderOrderRows(); });
  document.getElementById('orderStatusFilter').addEventListener('change', (e)=>{ ordersStatusFilter = e.target.value; renderOrderRows(); });
  renderOrderRows();
}
function renderOrderRows(){
  const el = document.getElementById('orderRowsBody'); if(!el) return;
  let list = [...orders];
  if(ordersStatusFilter!=='all') list = list.filter(o=>o.status===ordersStatusFilter);
  if(ordersSearch) list = list.filter(o=> o.id.includes(ordersSearch) || (o.customer||'').includes(ordersSearch));
  el.innerHTML = list.map(o => `
    <tr data-row="${o.id}" class="cursor-pointer hover:bg-gold/5 transition-colors ${o.seen===false ? 'bg-gold/5' : ''}">
      <td class="admin-td font-bold">${o.seen===false ? '<span class="inline-block w-2 h-2 rounded-full bg-burgundy ml-2 align-middle"></span>':''}#${o.id.slice(-6).toUpperCase()}</td><td class="admin-td">${o.customer}</td><td class="admin-td">${o.phone}</td>
      <td class="admin-td">${o.total} ج.س</td><td class="admin-td text-xs">${new Date(o.createdAt).toLocaleString('ar-EG')}</td>
      <td class="admin-td" data-stop><select data-status="${o.id}" class="admin-input !py-1 !text-xs">${ORDER_STATUSES.map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
      <td class="admin-td" data-stop><button data-invoice="${o.id}" class="seal-btn ghost !py-1.5 !px-3 text-xs"><i class="fa-solid fa-file-invoice ml-1"></i> فاتورة</button></td>
    </tr>`).join('') || `<tr><td class="admin-td opacity-50" colspan="7">لا توجد طلبات مطابقة</td></tr>`;
  el.querySelectorAll('[data-status]').forEach(sel => sel.onchange = ()=>updateOrderStatus(sel.dataset.status, sel.value));
  el.querySelectorAll('[data-invoice]').forEach(btn => btn.onclick = ()=>openInvoice(btn.dataset.invoice));
  el.querySelectorAll('[data-stop]').forEach(cell => cell.onclick = (e)=> e.stopPropagation());
  el.querySelectorAll('[data-row]').forEach(row => row.onclick = ()=> openOrderDetail(row.dataset.row));
}
async function updateOrderStatus(id, status){
  try{ await updateDoc(doc(db,'orders',id), { status }); showToast('تم تحديث حالة الطلب'); flashSync(); }
  catch(err){ showToast('تعذر تحديث الحالة — ' + friendlyFirebaseError(err), true); }
}

        <select data-status="${o.id}" class="admin-input !py-1.5 !text-sm mt-1">${ORDER_STATUSES.map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="admin-card overflow-hidden mb-6">
      <table class="w-full"><thead><tr><th class="admin-th">المنتج</th><th class="admin-th text-center">القسم</th><th class="admin-th text-center">الكمية</th><th class="admin-th text-center">السعر</th><th class="admin-th text-center">الإجمالي</th></tr></thead>

window.closeOrderDetail = () => { document.getElementById('orderDetailBg').classList.add('hidden'); document.getElementById('orderDetailBg').classList.remove('flex'); };

/* =========================================================================

========================================================================= */
function renderSettingsTab(){

    <div class="admin-card p-8 max-w-xl">
      <p class="font-bold mb-4"><i class="fa-solid fa-image text-gold ml-1"></i> صورة البانر الرئيسي (الهيرو)</p>
      <img src="${settings.heroImage || fallbackImg()}" id="bannerPreview" class="w-full h-48 object-cover rounded-xl mb-4">

      <p class="text-xs opacity-50 mt-3">يتحدث فوراً في الصفحة الرئيسية بدون أي كود.</p>

  document.getElementById('bannerInput').addEventListener('change', changeBanner);
}
async function changeBanner(e){
  const file = e.target.files[0]; if(!file) return;
  try{
    const url = await uploadImage(file, 'settings');
    await setDoc(doc(db,'settings','store'), { heroImage:url }, { merge:true });
    document.getElementById('bannerPreview').src = url;
    showToast('تم تحديث البانر الرئيسي فوراً 🖼️'); flashSync();
  }catch(err){ showToast('تعذر رفع الصورة — ' + friendlyFirebaseError(err), true); console.error(err); }
}

/* =========================================================================

let currentInvoiceOrder = null;

      <div style="display:flex; align-items:center; gap:10px;">

        <div><p style="font-family:'Aref Ruqaa',serif; font-size:22px; margin:0;">وشلي</p><p style="font-size:11px; color:#8a7a6f; margin:2px 0 0;">wishly Atelier — Luxury Event Favors</p></div>
      </div>
      <div style="text-align:left;">
        <p style="font-weight:800; font-size:20px; margin:0; color:#B08D3E;">فاتورة بيع</p>
        <p style="font-size:12px; color:#8a7a6f; margin:4px 0 0;">${invNo}</p>
        <p style="font-size:12px; color:#8a7a6f; margin:2px 0 0;">${dateStr}</p>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:24px; gap:20px;">
      <div><p style="font-size:11px; color:#8a7a6f; margin:0 0 4px;">فاتورة إلى</p><p style="font-weight:700; margin:0;">${o.customer}</p><p style="font-size:13px; color:#5a5049; margin:2px 0 0;">${o.phone}</p></div>

window.closeInvoice = () => { document.getElementById('invoiceModalBg').classList.add('hidden'); document.getElementById('invoiceModalBg').classList.remove('flex'); };
window.openInvoice = openInvoice;
window.downloadInvoicePDF = async () => {
  if(!currentInvoiceOrder) return;
  const el = document.getElementById('invoicePaper');
  const canvas = await html2canvas(el, { scale:2, backgroundColor:'#ffffff' });
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','pt','a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const props = pdf.getImageProperties(imgData);
  const imgHeight = props.height * pageWidth / props.width;
  pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgHeight);
  pdf.save(`فاتورة-${currentInvoiceOrder.id.slice(-6).toUpperCase()}.pdf`);
  showToast('تم تحميل الفاتورة بصيغة PDF 📄');
};
